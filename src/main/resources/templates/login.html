<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Actions de Charite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --charity-black: #111111;
            --charity-green: #1f8f4e;
            --charity-green-dark: #166d3b;
            --charity-white: #ffffff;
            --charity-line: #d7e4db;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #eef5f0 0%, #ffffff 45%, #ffffff 100%);
            color: var(--charity-black);
        }

        .auth-card {
            border: 1px solid var(--charity-line);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(17, 17, 17, 0.08);
        }

        .auth-head {
            background: var(--charity-black);
            color: var(--charity-white);
            padding: 20px;
        }

        .btn-charity {
            background: var(--charity-green);
            border: 1px solid var(--charity-green);
            color: #fff;
        }

        .btn-charity:hover {
            background: var(--charity-green-dark);
            border-color: var(--charity-green-dark);
            color: #fff;
        }

        .form-control:focus {
            border-color: #6ab88a;
            box-shadow: 0 0 0 .2rem rgba(31, 143, 78, 0.16);
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="auth-card bg-white">
                <div class="auth-head">
                    <h1 class="h4 mb-1">Connexion</h1>
                    <p class="mb-0 small opacity-75">Accedez a votre espace charity</p>
                </div>
                <div class="p-4">
                    <div id="messageBox" class="alert d-none"></div>

                    <div th:if="${param.logout}" class="alert alert-info">
                        Vous avez ete deconnecte.
                    </div>

                    <div th:if="${param.success}" class="alert alert-success">
                        Inscription reussie. Connectez-vous.
                    </div>

                    <form id="loginForm" class="row g-3">
                        <div class="col-12">
                            <label class="form-label mb-1">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label mb-1">Mot de passe</label>
                            <input type="password" name="password" class="form-control" minlength="8" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-charity w-100">Se connecter</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/register" class="link-success text-decoration-none">Pas encore de compte ? S'inscrire</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
<script>
const loginForm = document.getElementById('loginForm');
const messageBox = document.getElementById('messageBox');

loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    const formData = new FormData(loginForm);
    const payload = {
        email: formData.get('email'),
        password: formData.get('password')
    };

    const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(payload)
    });

    if (response.ok) {
        window.location.href = '/';
        return;
    }

    const errorText = await response.text();
    messageBox.className = 'alert alert-danger';
    messageBox.textContent = errorText || 'Email ou mot de passe incorrect.';
});
</script>
</body>
</html>
